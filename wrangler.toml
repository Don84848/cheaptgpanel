name = "telegram-bot"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Set these in Cloudflare Workers dashboard → Settings → Variables & Secrets
# TELEGRAM_BOT_TOKEN = "your-bot-token"
# TURSO_DATABASE_URL = "libsql://..."
# TURSO_AUTH_TOKEN = "eyJ..."
# ADMIN_WEBHOOK_SECRET = "any-random-secret-string"
